<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-scene" aria-hidden="true">
    <div class="bg-column bg-column--left"></div>
    <div class="bg-column bg-column--right"></div>

    <div class="bg-emblem bg-emblem--left">
      <svg class="bg-aquila" viewBox="0 0 100 220" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 24c-8 0-14 6-14 14s6 14 14 14 14-6 14-14-6-14-14-14z"/>
        <path d="M50 38 L18 72 28 58 50 48 72 58 82 72 Z"/>
        <path d="M50 48 L8 88 22 70 50 58 78 70 92 88 Z"/>
        <rect x="47" y="58" width="6" height="118" rx="1"/>
        <rect x="32" y="72" width="36" height="4" rx="1"/>
        <path d="M34 176h32l-4 28H38l-4-28z"/>
        <path d="M28 204h44v8c-6 4-14 6-22 6s-16-2-22-6v-8z"/>
      </svg>
    </div>

    <div class="bg-emblem bg-emblem--right">
      <svg class="bg-aquila" viewBox="0 0 100 220" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 24c-8 0-14 6-14 14s6 14 14 14 14-6 14-14-6-14-14-14z"/>
        <path d="M50 38 L18 72 28 58 50 48 72 58 82 72 Z"/>
        <path d="M50 48 L8 88 22 70 50 58 78 70 92 88 Z"/>
        <rect x="47" y="58" width="6" height="118" rx="1"/>
        <rect x="32" y="72" width="36" height="4" rx="1"/>
        <path d="M34 176h32l-4 28H38l-4-28z"/>
        <path d="M28 204h44v8c-6 4-14 6-22 6s-16-2-22-6v-8z"/>
      </svg>
    </div>

    <svg class="bg-arch bg-arch--left" viewBox="0 0 120 200" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 200V80a50 50 0 0 1 100 0v120"/>
      <path d="M22 200V88a38 38 0 0 1 76 0v112"/>
    </svg>
    <svg class="bg-arch bg-arch--right" viewBox="0 0 120 200" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 200V80a50 50 0 0 1 100 0v120"/>
      <path d="M22 200V88a38 38 0 0 1 76 0v112"/>
    </svg>

    <svg class="bg-laurel bg-laurel--top" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
      <path d="M100 8c-30 0-55 18-62 42 8-14 22-22 38-22s30 8 38 22c-7-24-32-42-62-42z"/>
      <path d="M70 20c-8 4-14 12-16 22M85 14c-4 8-5 18-2 28M115 14c4 8 5 18 2 28M130 20c8 4 14 12 16 22"/>
    </svg>

    <div class="bg-embers">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <p class="bg-spqr">S·P·Q·R</p>
  </div>

  <main class="game">
    <header class="game-header">
      <p class="subtitle">Ludus Scaccorum</p>
      <h1>Chess</h1>
      <p id="status">White to move</p>
    </header>

    <div class="board-frame">
      <div class="board-coords board-coords--files">
        <span>a</span><span>b</span><span>c</span><span>d</span>
        <span>e</span><span>f</span><span>g</span><span>h</span>
      </div>
      <div class="board-coords board-coords--ranks">
        <span>8</span><span>7</span><span>6</span><span>5</span>
        <span>4</span><span>3</span><span>2</span><span>1</span>
      </div>
      <div id="board"></div>
    </div>

    <footer class="game-footer">
      <button id="reset" type="button">Novus Ludus</button>
    </footer>
  </main>
  <script src="chess.js"></script>
</body>
</html>
